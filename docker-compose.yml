services:
  postgres:
    image: postgres:16-alpine
    container_name: ratings_db

    environment:
      POSTGRES_DB: ratings_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    ports:
      - "5000:5000"

    depends_on:
      - postgres

    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ratings_db
      CORS_ORIGIN: http://localhost:8080,http://localhost:4173
      ACCESS_TOKEN_SECRET: test-secret

  frontend:
    build:
      context: ./frontend

    ports:
      - 8080:80

    depends_on:
      - backend

volumes:
  postgres_data:
